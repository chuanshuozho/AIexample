<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: #d2d2d7;
            --shadow: rgba(0, 0, 0, 0.04);
            --sidebar-width: 280px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-primary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 200;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-title svg {
            width: 24px;
            height: 24px;
            fill: var(--accent);
        }

        .new-chat-btn {
            width: 100%;
            margin-top: 16px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, border-color 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent);
        }

        .new-chat-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .history-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: var(--bg-secondary);
        }

        .history-item.active {
            background: rgba(0, 113, 227, 0.1);
        }

        .history-item-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-item-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .history-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .menu-toggle {
            display: none;
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 10px;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle:hover {
            background: var(--bg-secondary);
        }

        .menu-toggle svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        /* Container */
        .container {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        /* Welcome Section */
        .welcome {
            text-align: center;
            padding: 40px 0;
        }

        .welcome-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .welcome-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .welcome h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #1d1d1f 0%, #424245 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome p {
            font-size: 17px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            border-radius: 18px;
            box-shadow: 0 2px 12px var(--shadow), 0 0 0 1px var(--border);
            overflow: hidden;
            min-height: 500px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Message Styles */
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 600;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #1d1d1f 0%, #424245 100%);
            color: white;
        }

        .message-content {
            flex: 1;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            letter-spacing: -0.01em;
        }

        .message.user .message-content {
            background: var(--accent);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 4px;
        }

        /* Markdown Styles */
        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3,
        .message.assistant .message-content h4 {
            margin: 16px 0 8px 0;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .message.assistant .message-content h1 { font-size: 22px; }
        .message.assistant .message-content h2 { font-size: 18px; }
        .message.assistant .message-content h3 { font-size: 16px; }
        .message.assistant .message-content h4 { font-size: 15px; }

        .message.assistant .message-content p {
            margin: 8px 0;
            line-height: 1.6;
        }

        .message.assistant .message-content ul,
        .message.assistant .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message.assistant .message-content li {
            margin: 4px 0;
            line-height: 1.5;
        }

        .message.assistant .message-content code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 13px;
        }

        .message.assistant .message-content pre {
            background: #1d1d1f;
            color: #f5f5f7;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .message.assistant .message-content pre code {
            background: transparent;
            padding: 0;
            color: inherit;
            font-size: 13px;
            line-height: 1.5;
        }

        .message.assistant .message-content blockquote {
            border-left: 4px solid var(--accent);
            margin: 12px 0;
            padding: 8px 16px;
            background: rgba(0, 113, 227, 0.05);
            border-radius: 0 8px 8px 0;
        }

        .message.assistant .message-content blockquote p {
            margin: 0;
        }

        .message.assistant .message-content strong {
            font-weight: 600;
        }

        .message.assistant .message-content em {
            font-style: italic;
        }

        .message.assistant .message-content a {
            color: var(--accent);
            text-decoration: none;
        }

        .message.assistant .message-content a:hover {
            text-decoration: underline;
        }

        .message.assistant .message-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }

        .message.assistant .message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }

        .message.assistant .message-content th,
        .message.assistant .message-content td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        .message.assistant .message-content th {
            background: var(--bg-secondary);
            font-weight: 600;
        }

        /* Input Area */
        .input-area {
            padding: 20px 24px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            position: relative;
        }

        .input-field textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 22px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            line-height: 1.4;
            min-height: 50px;
            max-height: 150px;
        }

        .input-field textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        .input-field textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* Loading Animation */
        .loading {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            padding: 40px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            fill: var(--border);
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* Overlay for mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 150;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.open {
                display: block;
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: flex;
            }

            .container {
                padding: 16px;
            }

            .welcome {
                padding: 24px 0;
            }

            .welcome h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                历史记录
            </div>
            <button class="new-chat-btn" onclick="clearChat()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                新对话
            </button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">暂无历史记录</div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <header class="header">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                </svg>
            </button>
            <span class="header-title">AI 智能助手</span>
            <div style="width: 40px;"></div>
        </header>

        <main class="container">
            <section class="welcome">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <h1>AI 智能助手</h1>
                <p>专业的服装客服，随时为您解答</p>
            </section>

            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                        </svg>
                        <p>开始对话，体验智能客服</p>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <div class="input-field">
                            <textarea 
                                id="messageInput" 
                                placeholder="输入您的问题..." 
                                rows="1"
                                onkeydown="handleKeyDown(event)"
                            ></textarea>
                        </div>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');
        const historyList = document.getElementById('historyList');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        let chatHistory = [];

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open');
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function addMessage(content, isUser) {
            if (emptyState) {
                emptyState.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? '我' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (isUser) {
                contentDiv.textContent = content;
            } else {
                const htmlContent = marked.parse(content);
                contentDiv.innerHTML = htmlContent;
                contentDiv.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return contentDiv;
        }

        function addLoadingMessage() {
            if (emptyState) {
                emptyState.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'loadingMessage';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'AI';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<span></span><span></span><span></span>';
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(loadingDiv);
            chatMessages.appendChild(messageDiv);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        function renderHistoryList() {
            if (chatHistory.length === 0) {
                historyList.innerHTML = '<div class="history-empty">暂无历史记录</div>';
                return;
            }

            historyList.innerHTML = '';
            
            // Show newest first in sidebar
            const reversedHistory = [...chatHistory].reverse();
            
            reversedHistory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => loadConversation(item);
                
                const title = document.createElement('div');
                title.className = 'history-item-title';
                title.textContent = item.userMessage.substring(0, 30) + (item.userMessage.length > 30 ? '...' : '');
                
                const time = document.createElement('div');
                time.className = 'history-item-time';
                time.textContent = formatTime(item.createTime);
                
                div.appendChild(title);
                div.appendChild(time);
                historyList.appendChild(div);
            });
        }

        function loadConversation(item) {
            // Clear current messages
            chatMessages.innerHTML = '';
            
            // Add the selected conversation
            addMessage(item.userMessage, true);
            addMessage(item.assistantReply, false);
            
            // Close sidebar on mobile
            if (window.innerWidth <= 900) {
                toggleSidebar();
            }
        }

        function clearChat() {
            chatMessages.innerHTML = '';
            emptyState.style.display = 'flex';
            chatMessages.appendChild(emptyState);
            
            // Close sidebar on mobile
            if (window.innerWidth <= 900) {
                toggleSidebar();
            }
            
            messageInput.focus();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            sendBtn.disabled = true;
            messageInput.value = '';
            messageInput.style.height = 'auto';

            addMessage(message, true);
            addLoadingMessage();

            try {
                const response = await fetch('/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                removeLoadingMessage();
                addMessage(data.reply, false);
                
                // Reload history to include new message
                loadChatHistory();
            } catch (error) {
                removeLoadingMessage();
                addMessage('抱歉，服务暂时不可用，请稍后再试。', false);
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        async function loadChatHistory() {
            try {
                const response = await fetch('/ai/history');
                chatHistory = await response.json();
                
                renderHistoryList();
            } catch (error) {
                console.error('Failed to load history:', error);
            }
        }

        // Focus input on load
        messageInput.focus();

        // Load chat history on page load
        loadChatHistory();
    </script>
</body>
</html>
